@if (!!games) {
  @for (player of gamePlayers; track player; let i = $index) {
    <div class="col-{{ game.slots }}-slots" style="padding-left: 2px; padding-right: 2px">
      <pydt-player-avatar
        [game]="game"
        [players]="gamePlayers"
        [gamePlayerProfiles]="gamePlayerProfiles"
        [civDefs]="civDefs"
        [civGame]="civGame"
        [index]="i"
      ></pydt-player-avatar>
    </div>
  }
}
